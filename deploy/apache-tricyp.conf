# TriCyp Next.js — reverse-proxied to a standalone Node server on :3003.
# Drop into /etc/apache2/sites-available/ (or include from a vhost
# already serving the parent site) and reload Apache.
#
# Modules required:
#   a2enmod proxy proxy_http
#
# basePath is preserved through the proxy: the Next.js build is
# compiled with NEXT_PUBLIC_BASE_PATH=/tricyp so its routes and
# static assets all sit under /tricyp/* (Apache forwards the URL
# unchanged).

# TriCyp Next.js site
ProxyPass        /tricyp http://localhost:3003/tricyp
ProxyPassReverse /tricyp http://localhost:3003/tricyp

# Optional: forward client metadata so server-side logs can attribute
# requests correctly through the proxy.
RequestHeader set X-Forwarded-Proto "https"
ProxyPreserveHost On
