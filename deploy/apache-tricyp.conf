# TriCyp Next.js — reverse-proxied to standalone Node on sangala:3003.
# Apache vhost is on prodata; the standalone server is on sangala.
# Both are inside the SWMED LAN, so Apache forwards by hostname.
#
# Modules required:
#   a2enmod proxy proxy_http headers
#
# basePath /tricyp is preserved through the proxy: the Next.js build
# is compiled with BASE_PATH=/tricyp so its routes and static assets
# all sit under /tricyp/* (Apache forwards the URL unchanged).

# TriCyp Next.js site
ProxyPass        /tricyp http://sangala:3003/tricyp
ProxyPassReverse /tricyp http://sangala:3003/tricyp

# Forward client metadata so server-side logs attribute requests
# correctly through the proxy.
RequestHeader set X-Forwarded-Proto "https"
ProxyPreserveHost On
